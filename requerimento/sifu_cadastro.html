<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIFU – Cadastro</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

<div class="left-panel">
  <div class="logo-block">
    <div class="logo-ufersa">
      <div class="logo-bar-login"></div>
      <div class="logo-nome-login">UFERSA</div>
      <div class="logo-bar-bottom"></div>
      <div class="logo-sub">Universidade Federal Rural do Semi-Árido</div>
    </div>
  </div>
  <div class="left-title">
    <h1>Crie sua<br>Conta <span>SIFU</span></h1>
    <p>Acesso unificado para alunos, professores e técnicos administrativos.</p>
  </div>
</div>

<div class="right-panel">
  <div class="form-box">
    <h2>Primeiro Acesso</h2>
    <p class="sub">Preencha seus dados para criar uma conta institucional</p>

    <div class="field">
      <label>Nome Completo</label>
      <input type="text" placeholder="Ex: Maria Clara da Silva">
    </div>
    <div class="field-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px;">
      <div>
        <label style="display: block; font-size: 12px; font-weight: 500; color: var(--azul); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 7px;">Matrícula / SIAPE</label>
        <input type="text" placeholder="Ex: 20210012" style="width: 100%; padding: 13px 16px; border: 2px solid var(--cinza-borda); border-radius: 8px; font-size: 15px; outline: none; background: var(--cinza-bg);">
      </div>
      <div>
        <label style="display: block; font-size: 12px; font-weight: 500; color: var(--azul); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 7px;">Vínculo</label>
        <select style="width: 100%; padding: 13px 16px; border: 2px solid var(--cinza-borda); border-radius: 8px; font-size: 15px; outline: none; background: var(--cinza-bg);">
          <option>Discente</option>
          <option>Docente</option>
          <option>Técnico Administrativo</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>E-mail Institucional</label>
      <input type="email" placeholder="maria@alunos.ufersa.edu.br">
    </div>
    <div class="field">
      <label>Crie uma Senha</label>
      <input type="password" placeholder="••••••••••">
    </div>

    <button class="btn-entrar" onclick="alert('Cadastro realizado com sucesso!'); window.location.href='sifu_tela_login.html'">Cadastrar</button>

    <p class="divider">Já possui conta? <a href="sifu_tela_login.html">Faça login aqui</a></p>
  </div>
</div>

</body>
</html>
