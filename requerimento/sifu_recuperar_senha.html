<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIFU – Recuperar Senha</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

<div class="left-panel">
  <div class="logo-block">
    <div class="logo-ufersa">
      <div class="logo-bar-login"></div>
      <div class="logo-nome-login">UFERSA</div>
      <div class="logo-bar-bottom"></div>
    </div>
  </div>
  <div class="left-title">
    <h1>Recuperação<br>de <span>Acesso</span></h1>
    <p>Siga as instruções para redefinir sua senha com segurança.</p>
  </div>
</div>

<div class="right-panel">
  <div class="form-box">
    <h2>Esqueceu a senha?</h2>
    <p class="sub" style="line-height: 1.5;">Informe seu CPF ou E-mail cadastrado. Enviaremos um link seguro para a redefinição da sua senha.</p>

    <div class="field" style="margin-top: 20px;">
      <label>CPF ou E-mail</label>
      <input type="text" placeholder="Digite aqui...">
    </div>

    <button class="btn-entrar" onclick="alert('Link de recuperação enviado para o seu e-mail!'); window.location.href='sifu_tela_login.html'">Enviar Link de Recuperação</button>

    <p class="divider" style="margin-top: 30px;"><a href="sifu_tela_login.html">← Voltar para o Login</a></p>
  </div>
</div>

</body>
</html>
