<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIFU – Cadastro (Tailwind)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            azulUfersa: '#243E6A',
            azulEscuro: '#10396B',
            verdeUfersa: '#99CC33',
            cinzaBg: '#F4F6FA',
          },
          fontFamily: {
            roboto: ['Roboto', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="font-roboto min-h-screen flex flex-col md:flex-row bg-cinzaBg">

  <div class="md:w-1/2 bg-gradient-to-br from-azulUfersa via-azulEscuro to-[#0A5242] p-10 md:p-14 flex flex-col justify-center relative overflow-hidden text-white">
    <div class="absolute -top-24 -right-32 w-[420px] h-[420px] rounded-full border-[60px] border-verdeUfersa/10 pointer-events-none"></div>
    
    <div class="z-10">
      <div class="mb-10">
        <div class="h-1.5 bg-verdeUfersa w-60 rounded-sm mb-1.5"></div>
        <h2 class="text-4xl font-black tracking-[4px]">UFERSA</h2>
        <div class="h-1.5 bg-verdeUfersa w-60 rounded-sm mt-1.5"></div>
      </div>
      <h1 class="text-5xl font-black leading-[1.1] mb-6">Crie sua<br>Conta <span class="text-verdeUfersa">SIFU</span></h1>
      <p class="text-lg text-white/70 max-w-sm leading-relaxed">Acesso unificado para alunos, professores e técnicos administrativos.</p>
    </div>
  </div>

  <div class="md:w-1/2 bg-white flex flex-col justify-center items-center p-10 md:p-14">
    <div class="w-full max-w-[420px]">
      <h2 class="text-3xl font-bold text-azulUfersa mb-1">Primeiro Acesso</h2>
      <p class="text-slate-400 text-sm mb-8">Preencha os dados para criar a sua conta institucional</p>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-azulUfersa uppercase tracking-widest mb-2">Nome Completo</label>
          <input type="text" placeholder="Ex: Maria Clara da Silva" class="w-full px-4 py-3 border-2 border-slate-200 rounded-lg bg-cinzaBg focus:bg-white focus:border-blue-500 outline-none transition-all">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-azulUfersa uppercase tracking-widest mb-2">Matrícula / SIAPE</label>
            <input type="text" placeholder="Ex: 20210012" class="w-full px-4 py-3 border-2 border-slate-200 rounded-lg bg-cinzaBg focus:bg-white focus:border-blue-500 outline-none transition-all">
          </div>
          <div>
            <label class="block text-xs font-bold text-azulUfersa uppercase tracking-widest mb-2">Vínculo</label>
            <select class="w-full px-4 py-3 border-2 border-slate-200 rounded-lg bg-cinzaBg focus:bg-white focus:border-blue-500 outline-none transition-all text-sm">
              <option>Discente</option>
              <option>Docente</option>
              <option>Técnico Administrativo</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-azulUfersa uppercase tracking-widest mb-2">E-mail Institucional</label>
          <input type="email" placeholder="maria@alunos.ufersa.edu.br" class="w-full px-4 py-3 border-2 border-slate-200 rounded-lg bg-cinzaBg focus:bg-white focus:border-blue-500 outline-none transition-all">
        </div>

        <div>
          <label class="block text-xs font-bold text-azulUfersa uppercase tracking-widest mb-2">Crie uma Senha</label>
          <input type="password" placeholder="••••••••••" class="w-full px-4 py-3 border-2 border-slate-200 rounded-lg bg-cinzaBg focus:bg-white focus:border-blue-500 outline-none transition-all">
        </div>
      </div>

      <button onclick="alert('Cadastro realizado!'); window.location.href='sifu_tela_login.html'" class="w-full mt-8 py-4 bg-gradient-to-r from-azulUfersa to-blue-500 text-white rounded-lg font-bold shadow-lg shadow-blue-900/20 hover:opacity-90 transition-opacity">
        Finalizar Cadastro
      </button>

      <p class="mt-8 text-center text-sm text-slate-400">Já possui conta? <a href="sifu_tela_login.html" class="text-azulUfersa font-bold hover:underline">Faça login aqui</a></p>
    </div>
  </div>
</body>
</html>
