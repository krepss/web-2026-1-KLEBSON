<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIFU – Recuperar Senha</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            azulUfersa: '#243E6A',
            azulEscuro: '#10396B',
            verdeUfersa: '#99CC33',
            cinzaBg: '#F4F6FA',
          },
          fontFamily: {
            roboto: ['Roboto', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="font-roboto min-h-screen flex flex-col md:flex-row bg-cinzaBg">

  <div class="md:w-1/2 bg-gradient-to-br from-azulUfersa via-azulEscuro to-[#0A5242] p-10 md:p-14 flex flex-col justify-center relative overflow-hidden text-white">
    <div class="absolute -bottom-16 -left-20 w-[240px] h-[240px] rounded-full border-[40px] border-white/5 pointer-events-none"></div>
    
    <div class="z-10">
      <div class="mb-10">
        <div class="h-1.5 bg-verdeUfersa w-40 rounded-sm mb-1.5"></div>
        <h2 class="text-4xl font-black tracking-[4px]">UFERSA</h2>
      </div>
      <h1 class="text-5xl font-black leading-[1.1] mb-6">Recuperação<br>de <span class="text-verdeUfersa">Acesso</span></h1>
      <p class="text-lg text-white/70 max-w-sm leading-relaxed">Siga as instruções para redefinir a sua senha com segurança.</p>
    </div>
  </div>

  <div class="md:w-1/2 bg-white flex flex-col justify-center items-center p-10 md:p-14 text-center md:text-left">
    <div class="w-full max-w-[380px]">
      <div class="mb-8 flex justify-center md:justify-start">
        <span class="text-5xl">🔑</span>
      </div>
      <h2 class="text-3xl font-bold text-azulUfersa mb-3">Esqueceu a senha?</h2>
      <p class="text-slate-500 text-sm leading-relaxed mb-8">Informe o seu CPF ou E-mail institucional. Enviaremos um link seguro para a redefinição da sua senha.</p>

      <div class="mb-6">
        <label class="block text-xs font-bold text-azulUfersa uppercase tracking-widest mb-2 text-left">CPF ou E-mail</label>
        <input type="text" placeholder="Digite aqui os seus dados..." class="w-full px-4 py-4 border-2 border-slate-200 rounded-lg bg-cinzaBg focus:bg-white focus:border-blue-500 outline-none transition-all">
      </div>

      <button onclick="alert('Link enviado!'); window.location.href='sifu_tela_login.html'" class="w-full py-4 bg-azulUfersa text-white rounded-lg font-bold shadow-lg hover:bg-azulEscuro transition-all">
        Enviar Link de Recuperação
      </button>

      <div class="mt-10 border-t border-slate-100 pt-6">
        <a href="sifu_tela_login.html" class="text-sm font-bold text-slate-400 hover:text-azulUfersa transition-colors flex items-center justify-center md:justify-start gap-2">
          <span>←</span> Voltar para o Login
        </a>
      </div>
    </div>
  </div>
</body>
</html>
